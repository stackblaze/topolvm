apiVersion: v1
kind: Pod
metadata:
  name: %s
spec:
  restartPolicy: Never
  containers:
    - name: reader
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          set -eu
          # Wait up to 30s for the file to exist, then emit it.
          for i in $(seq 1 30); do
            if [ -f /data/hello.txt ]; then break; fi
            sleep 1
          done
          cat /data/hello.txt
      volumeMounts:
        - mountPath: /data
          name: data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: %s
