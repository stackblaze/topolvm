---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: restores.topolvm.cybozu.com
spec:
  group: topolvm.cybozu.com
  names:
    kind: Restore
    listKind: RestoreList
    plural: restores
    singular: restore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.sourcePVCName
      name: Source
      type: string
    - jsonPath: .spec.targetPVCName
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Restore is the Schema for restic-backed PVC restore operations.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              RestoreSpec defines a single restore operation from a restic repository
              back into a fresh PersistentVolumeClaim.
            properties:
              size:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Size is the capacity for the target PVC. It should be at least as large
                  as the source.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              snapshotID:
                description: |-
                  SnapshotID is the restic snapshot id to restore. If empty, "latest" is
                  used.
                type: string
              sourceNamespace:
                description: |-
                  SourceNamespace is the namespace of the PVC whose backups should be
                  restored. The restic repository key is "<sourceNamespace>/<sourcePVCName>".
                type: string
              sourcePVCName:
                description: SourcePVCName is the name of the original PVC that was
                  backed up.
                type: string
              storageClassName:
                description: |-
                  StorageClassName is the StorageClass for the target PVC. Must reference
                  a TopoLVM StorageClass.
                type: string
              targetPVCName:
                description: |-
                  TargetPVCName is the name of the PVC to create in this Restore's
                  namespace. The controller provisions this PVC with the given size and
                  storage class, then mounts it into the restic restore Job.
                type: string
            required:
            - size
            - sourceNamespace
            - sourcePVCName
            - storageClassName
            - targetPVCName
            type: object
          status:
            description: RestoreStatus reports the observed state of a Restore.
            properties:
              completionTime:
                description: CompletionTime is when the restore Job reached a terminal
                  state.
                format: date-time
                type: string
              conditions:
                description: Conditions is the list of conditions for this Restore.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              jobName:
                description: JobName is the name of the Job running the restic restore.
                type: string
              message:
                description: Message is a human-readable explanation of the current
                  phase.
                type: string
              phase:
                description: RestorePhase captures the coarse state of a Restore.
                type: string
              startTime:
                description: StartTime is when the restore Job was created.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
