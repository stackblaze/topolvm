name: "e2e-k8s"
on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "CODEOWNERS"
  push:
    paths-ignore:
      - "**/*.md"
      - "CODEOWNERS"
    branches:
      - "main"

jobs:
  build:
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: cache e2e sidecar binaries
        uses: actions/cache@v5
        with:
          path: |
            test/e2e/tmpbin
          key: e2e-sidecars-${{ hashFiles('csi-sidecars.mk', 'versions.mk') }}
          restore-keys: |
            e2e-sidecars-
      - run: make -C test/e2e setup
      - run: make -C test/e2e topolvm.img
      - uses: actions/cache/save@v5
        with:
          path: |
            bin
            test/e2e/bin
            test/e2e/topolvm.img
          key: e2e-cache-${{ github.sha }}

  default:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "daemonset"
      test_legacy: "false"

  scheduler-manifest:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "deployment"
      test_legacy: "false"

  use-legacy:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "deployment"
      test_legacy: "true"

  storage-capacity-scoring:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "none"
      test_legacy: "false"

  rwx:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    with:
      test_scheduler_extender_type: "daemonset"
      test_legacy: "false"
      rwx_enabled: "1"
      kubernetes_versions: '["1.34.3"]'
      ginkgo_flags: "--focus=rwx"

  backup:
    needs: build
    uses: ./.github/workflows/e2e-k8s-workflow.yaml
    # Skip on forks: PRs from forks cannot access repo secrets, so the backup
    # job would always skip. Running only on same-repo events avoids the noise.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    with:
      test_scheduler_extender_type: "daemonset"
      test_legacy: "false"
      backup_enabled: "1"
      kubernetes_versions: '["1.34.3"]'
      ginkgo_flags: "--focus=backup"
    secrets:
      BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
      BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
      BACKUP_S3_ACCESS_KEY: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
      BACKUP_S3_SECRET_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
      BACKUP_RESTIC_PASSWORD: ${{ secrets.BACKUP_RESTIC_PASSWORD }}
